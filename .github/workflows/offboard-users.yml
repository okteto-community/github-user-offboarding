name: Offboard GitHub Users from Okteto

on:
  schedule:
    # Runs nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — log removals without deleting'
        type: boolean
        default: false

jobs:
  offboard:
    name: Remove offboarded users
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run offboarding
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ORG: ${{ vars.GH_ORG }}
          OKTETO_TOKEN: ${{ secrets.OKTETO_TOKEN }}
          OKTETO_URL: ${{ vars.OKTETO_URL }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="-e DRY_RUN=true"
          fi
          docker run --rm \
            -e GH_TOKEN \
            -e GH_ORG \
            -e OKTETO_TOKEN \
            -e OKTETO_URL \
            $DRY_RUN_FLAG \
            ghcr.io/${{ github.repository }}:latest
